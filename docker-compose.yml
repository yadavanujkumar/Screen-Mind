version: "3.9"

networks:
  screenmind-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  faiss-data:
  grafana-data:
  es-data:

x-common-env: &common-env
  DATABASE_URL: postgresql://screenmind:${POSTGRES_PASSWORD}@postgres:5432/screenmind
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: screenmind
      POSTGRES_USER: screenmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - screenmind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screenmind -d screenmind"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - screenmind-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Core Services ────────────────────────────────────────────────────────────
  auth:
    build: ./services/auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - screenmind-network

  api-gateway:
    build: ./services/api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      AUTH_URL: http://auth:8001
      SCREEN_CAPTURE_URL: http://screen-capture:8002
      VISION_URL: http://vision:8003
      STATE_BUILDER_URL: http://state-builder:8004
      LLM_REASONING_URL: http://llm-reasoning:8005
      TASK_PLANNER_URL: http://task-planner:8006
      ACTION_EXECUTION_URL: http://action-execution:8007
      MEMORY_URL: http://memory:8008
      VERIFICATION_URL: http://verification:8009
      OBSERVABILITY_URL: http://observability:8010
      EXPLAINABILITY_URL: http://explainability:8011
      TASK_QUEUE_URL: http://task-queue:8012
      CONVERSATION_URL: http://conversation:8013
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - screenmind-network

  screen-capture:
    build: ./services/screen-capture
    restart: unless-stopped
    ports:
      - "8002:8002"
    privileged: true
    environment:
      <<: *common-env
    networks:
      - screenmind-network

  vision:
    build: ./services/vision
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
    networks:
      - screenmind-network

  state-builder:
    build: ./services/state-builder
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
    networks:
      - screenmind-network

  llm-reasoning:
    build: ./services/llm-reasoning
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    networks:
      - screenmind-network

  task-planner:
    build: ./services/task-planner
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      <<: *common-env
      LLM_REASONING_URL: http://llm-reasoning:8005
      MEMORY_URL: http://memory:8008
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - screenmind-network

  action-execution:
    build: ./services/action-execution
    restart: unless-stopped
    ports:
      - "8007:8007"
    privileged: true
    environment:
      <<: *common-env
      SAFE_MODE: "false"
      BLOCK_DANGEROUS_KEYS: "true"
      VERIFICATION_URL: http://verification:8009
      OBSERVABILITY_URL: http://observability:8010
    networks:
      - screenmind-network

  memory:
    build: ./services/memory
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      <<: *common-env
      FAISS_INDEX_PATH: /data/faiss.index
    volumes:
      - faiss-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - screenmind-network

  verification:
    build: ./services/verification
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      <<: *common-env
      VISION_URL: http://vision:8003
    networks:
      - screenmind-network

  observability:
    build: ./services/observability
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      <<: *common-env
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JAEGER_HOST: ${JAEGER_HOST:-jaeger}
      JAEGER_PORT: ${JAEGER_PORT:-6831}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - screenmind-network

  explainability:
    build: ./services/explainability
    restart: unless-stopped
    ports:
      - "8011:8011"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - screenmind-network

  task-queue:
    build: ./services/task-queue
    restart: unless-stopped
    ports:
      - "8012:8012"
    environment:
      <<: *common-env
      TASK_PLANNER_URL: http://task-planner:8006
      ACTION_EXECUTION_URL: http://action-execution:8007
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - screenmind-network

  conversation:
    build: ./services/conversation
    restart: unless-stopped
    ports:
      - "8013:8013"
    environment:
      <<: *common-env
      LLM_REASONING_URL: http://llm-reasoning:8005
      TASK_PLANNER_URL: http://task-planner:8006
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    depends_on:
      - task-planner
    networks:
      - screenmind-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
    depends_on:
      - api-gateway
    networks:
      - screenmind-network

  # ─── Monitoring Stack ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - screenmind-network

  grafana:
    image: grafana/grafana:11.3.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - screenmind-network

  # ─── Logging Stack ────────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.16.3
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - screenmind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana:
    image: kibana:8.16.3
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - screenmind-network
